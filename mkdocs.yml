site_name: Regatta Data Platform

repo_name: Regatta Data Platform
repo_url: https://github.com/RGB-420/yacht

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md

  - Project:
      - Overview: project/overview.md
      - Roadmap: project/roadmap.md

  - Architecture:
      - System Overview: architecture/system-overview.md
      - Data Model: architecture/data-model.md

  - Decisions:
      - Overview: decisions/index.md
      - ADR-001: decisions/adr-001-database-first-architecture.md
      - ADR-002: decisions/adr-002-raw-vs-canonical-layer.md
      - ADR-003: decisions/adr-003-jsonb-raw-storage.md
      - ADR-004: decisions/adr-004-entity-centric-data-model.md

  - AI Context:
      - AI Development Context: ai-context/ai-development-context.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - search